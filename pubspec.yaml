name: stride
description: Discipline and habit-building app powered by quests and streaks.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ================= STATE MANAGEMENT =================
  provider: ^6.1.2

  # ================= UI / ANIMATION =================
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  confetti: ^0.7.0
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  animated_notch_bottom_bar: ^1.0.3 # <--- THE CORRECT PACKAGE FOR THE VIDEO LOOK

  # ================= FIREBASE =================
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  cloud_firestore: ^5.1.1

  # ================= SOCIAL AUTH =================
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1

  # ================= AUDIO & VIBRATION =================
  audioplayers: ^6.1.0
  vibration: ^2.0.0
  flutter_local_notifications: ^17.2.3

  # ================= UTILITIES =================
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  timezone: ^0.9.4
  flutter_timezone: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # ================= ASSETS =================
  assets:
    - assets/logo/
    - assets/icons/
    - assets/icons/modes/
    - assets/illustrations/
    - assets/illustrations/modes/
    - assets/illustrations/onboarding/
    - assets/animations/
    - assets/ascension/
    - assets/sounds/
    - assets/animations/mascot/